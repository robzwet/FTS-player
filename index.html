<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Add a Video</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #08080f;
    --surface: #0f0f1a;
    --card:    #13131f;
    --border:  #1f1f32;
    --accent:  #e8ff47;
    --text:    #f0f0f0;
    --muted:   #55557a;
    --muted2:  #888899;
    --green:   #47ffb2;
    --danger:  #ff4f47;
    --radius:  12px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(232,255,71,.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%,  rgba(71,255,178,.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px 100px;
  }

  /* ── HEADER ── */
  .header {
    padding: 48px 0 36px;
    text-align: center;
    animation: fadeUp .5s ease both;
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,255,71,.08);
    border: 1px solid rgba(232,255,71,.18);
    border-radius: 20px;
    padding: 5px 14px;
    margin-bottom: 18px;
  }

  .live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 8vw, 3.2rem);
    font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
    margin-bottom: 12px;
  }
  h1 .hl { color: var(--accent); }

  .header-sub {
    font-size: .92rem; color: var(--muted2); line-height: 1.6;
    max-width: 360px; margin: 0 auto;
  }

  /* ── SEARCH ── */
  .search-wrap {
    margin-bottom: 24px;
    animation: fadeUp .5s .1s ease both;
  }

  .search-box {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,.1);
  }

  .search-icon {
    flex-shrink: 0; width: 52px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .search-icon svg { width: 20px; height: 20px; fill: currentColor; }

  #searchInput {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; padding: 16px 0;
    caret-color: var(--accent);
  }
  #searchInput::placeholder { color: var(--muted); }

  #clearBtn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    width: 40px; height: 40px; border-radius: 8px;
    color: var(--muted); margin-right: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  #clearBtn:hover { color: var(--text); background: var(--border); }
  #clearBtn svg { width: 16px; height: 16px; fill: currentColor; }
  #clearBtn.hidden { display: none; }

  .search-btn {
    flex-shrink: 0;
    background: var(--accent); color: #000;
    border: none; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: .85rem; letter-spacing: .04em;
    padding: 0 22px; height: 56px;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .search-btn:hover   { opacity: .85; }
  .search-btn:active  { transform: scale(.97); }
  .search-btn:disabled { opacity: .4; cursor: default; transform: none; }

  .search-hint {
    margin-top: 9px;
    font-family: 'DM Mono', monospace;
    font-size: .65rem; color: var(--muted);
    letter-spacing: .04em; text-align: center;
  }

  /* ── STATES ── */
  .state {
    text-align: center; padding: 48px 0 24px;
    animation: fadeUp .35s ease both;
  }

  .state-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .state-icon svg { width: 28px; height: 28px; fill: var(--muted); }

  .state-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .state-sub   { font-size: .84rem; color: var(--muted2); line-height: 1.6; }

  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULTS ── */
  .results-label {
    font-family: 'DM Mono', monospace;
    font-size: .65rem; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 12px;
    animation: fadeUp .3s ease both;
  }

  .results-grid { display: flex; flex-direction: column; gap: 10px; }

  /* ── VIDEO CARD ── */
  .vcard {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px;
    transition: border-color .2s, background .2s, transform .15s;
    animation: fadeUp .3s ease both;
    position: relative; overflow: hidden;
  }
  .vcard::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: transparent;
    border-radius: 0 2px 2px 0; transition: background .2s;
  }
  .vcard:hover                { border-color: rgba(232,255,71,.3); background: #16162a; transform: translateY(-1px); }
  .vcard:hover::before        { background: var(--accent); }
  .vcard.added                { border-color: rgba(71,255,178,.3); background: rgba(71,255,178,.04); }
  .vcard.added::before        { background: var(--green); }
  .vcard.in-queue             { opacity: .6; }
  .vcard.in-queue::before     { background: var(--muted); }

  .vcard-thumb {
    flex-shrink: 0; width: 110px; height: 62px;
    border-radius: 8px; object-fit: cover;
    background: var(--surface); border: 1px solid var(--border);
  }

  .vcard-body { flex: 1; min-width: 0; padding-top: 1px; }

  .vcard-title {
    font-size: .88rem; font-weight: 500; line-height: 1.35;
    margin-bottom: 5px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .vcard.added    .vcard-title { color: var(--green); }
  .vcard.in-queue .vcard-title { color: var(--muted2); }

  .vcard-meta {
    font-family: 'DM Mono', monospace; font-size: .63rem;
    color: var(--muted2); display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .vcard-meta-sep { color: var(--border); }

  .vcard-action { flex-shrink: 0; align-self: center; }

  .add-btn {
    background: var(--accent); color: #000;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: .78rem; letter-spacing: .03em;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 6px;
    transition: opacity .15s, transform .1s; white-space: nowrap;
  }
  .add-btn:hover  { opacity: .85; }
  .add-btn:active { transform: scale(.96); }
  .add-btn:disabled { opacity: .4; cursor: default; transform: none; }
  .add-btn svg { width: 14px; height: 14px; fill: currentColor; }

  .added-badge {
    display: none; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: .7rem;
    color: var(--green); white-space: nowrap;
  }
  .added-badge svg { width: 14px; height: 14px; fill: currentColor; }

  .inqueue-badge {
    display: none; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: .7rem;
    color: var(--muted2); white-space: nowrap;
  }

  .vcard.added    .add-btn        { display: none; }
  .vcard.added    .added-badge    { display: flex; }
  .vcard.in-queue .add-btn        { display: none; }
  .vcard.in-queue .inqueue-badge  { display: flex; }

  /* ── QUEUE PEEK ── */
  .queue-peek {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.16,1,.3,1);
  }
  .queue-peek.visible { transform: translateY(0); }

  .queue-peek-inner {
    max-width: 560px; margin: 0 auto;
    padding: 0 20px 16px;
  }

  .queue-bar {
    background: var(--accent); color: #000;
    border-radius: 14px; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 -4px 40px rgba(232,255,71,.2);
  }

  .queue-bar-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(0,0,0,.12);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .queue-bar-icon svg { width: 18px; height: 18px; fill: #000; }

  .queue-bar-text { flex: 1; }
  .queue-bar-count { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 800; }
  .queue-bar-sub   { font-family: 'DM Mono', monospace; font-size: .63rem; opacity: .65; margin-top: 1px; }

  .queue-bar-check {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,.12);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .queue-bar-check svg { width: 16px; height: 16px; fill: #000; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--green); color: #000;
    font-family: 'DM Mono', monospace;
    font-size: .75rem; font-weight: 500; letter-spacing: .04em;
    padding: 10px 20px; border-radius: 30px;
    opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err  { background: var(--danger); color: #fff; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="eyebrow"><div class="live-dot"></div>Now Playing on the Big Screen</div>
    <h1>Pick a video<br>for the <span class="hl">crowd</span></h1>
    <p class="header-sub">Search for any YouTube video and add it to the live queue — it'll play on the projector automatically.</p>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <div class="search-icon">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </div>
      <input type="text" id="searchInput" placeholder="Search for a song, video, artist…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="clearBtn" class="hidden" onclick="clearSearch()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
    <div class="search-hint">Or paste a YouTube link directly in the search box</div>
  </div>

  <div id="dynArea"></div>
</div>

<div class="queue-peek" id="queuePeek">
  <div class="queue-peek-inner">
    <div class="queue-bar">
      <div class="queue-bar-icon">
        <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <div class="queue-bar-text">
        <div class="queue-bar-count" id="peekCount">1 video added</div>
        <div class="queue-bar-sub">It'll play on the projector soon</div>
      </div>
      <div class="queue-bar-check">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'api.php';
let addedThisSession = new Set();
let knownQueueIds    = new Set();

// ── API ──────────────────────────────────────
async function apiFetch(params) {
  const r = await fetch(API + '?' + new URLSearchParams(params));
  return r.json();
}

async function apiPost(body) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

// ── HELPERS ──────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractId(raw) {
  raw = raw.trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
  const pats = [/[?&]v=([a-zA-Z0-9_-]{11})/, /youtu\.be\/([a-zA-Z0-9_-]{11})/, /\/embed\/([a-zA-Z0-9_-]{11})/, /\/shorts\/([a-zA-Z0-9_-]{11})/];
  for (const p of pats) { const m = raw.match(p); if (m) return m[1]; }
  return null;
}

// ── TOAST ────────────────────────────────────
let toastTimer;
function toast(msg, err) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  toastTimer = setTimeout(() => el.className = 'toast', 2600);
}

// ── QUEUE PEEK ───────────────────────────────
function updatePeek() {
  const peek = document.getElementById('queuePeek');
  const c = addedThisSession.size;
  if (!c) { peek.classList.remove('visible'); return; }
  peek.classList.add('visible');
  document.getElementById('peekCount').textContent = c + ' video' + (c !== 1 ? 's' : '') + ' added to queue';
}

// ── ADD TO QUEUE ─────────────────────────────
async function addVideo(video, cardEl) {
  const btn = cardEl.querySelector('.add-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg viewBox="0 0 24 24" style="animation:spin .6s linear infinite"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>';

  const res = await apiPost({ action: 'add', video });

  if (res.ok) {
    cardEl.classList.add('added');
    addedThisSession.add(video.id);
    knownQueueIds.add(video.id);
    updatePeek();
    toast('✓ Added! It\'ll play on the projector soon.');
  } else {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add';
    toast(res.error === 'Already in queue' ? 'Already in the queue!' : 'Could not add video', true);
    if (res.error === 'Already in queue') {
      cardEl.classList.remove('added');
      cardEl.classList.add('in-queue');
    }
  }
}

// ── RENDER RESULTS ───────────────────────────
function renderResults(items) {
  const area = document.getElementById('dynArea');

  if (!items.length) {
    area.innerHTML = `
      <div class="state">
        <div class="state-icon"><svg viewBox="0 0 24 24"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg></div>
        <div class="state-title">No results found</div>
        <div class="state-sub">Try different keywords or paste a YouTube URL directly.</div>
      </div>`;
    return;
  }

  area.innerHTML = `
    <div class="results-label">${items.length} result${items.length !== 1 ? 's' : ''}</div>
    <div class="results-grid">
      ${items.map((v, i) => {
        const isAdded   = addedThisSession.has(v.id);
        const isInQueue = knownQueueIds.has(v.id) && !isAdded;
        return `
        <div class="vcard ${isAdded ? 'added' : isInQueue ? 'in-queue' : ''}"
             id="card-${escHtml(v.id)}" style="animation-delay:${i*0.05}s">
          <img class="vcard-thumb"
               src="https://img.youtube.com/vi/${escHtml(v.id)}/mqdefault.jpg"
               onerror="this.src='https://img.youtube.com/vi/${escHtml(v.id)}/default.jpg'"
               loading="lazy">
          <div class="vcard-body">
            <div class="vcard-title">${escHtml(v.title)}</div>
            <div class="vcard-meta">
              <span>${escHtml(v.channel || '')}</span>
              ${v.duration ? `<span class="vcard-meta-sep">·</span><span>${escHtml(v.duration)}</span>` : ''}
              ${v.views    ? `<span class="vcard-meta-sep">·</span><span>${escHtml(v.views)}</span>`    : ''}
            </div>
          </div>
          <div class="vcard-action">
            <button class="add-btn" onclick="addVideo({id:'${escHtml(v.id)}',title:'${escHtml(v.title).replace(/'/g,"\\'").replace(/\n/g,'')}',channel:'${escHtml(v.channel||'').replace(/'/g,"\\'")}',duration:'${escHtml(v.duration||'')}'}, document.getElementById('card-${escHtml(v.id)}'))">
              <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add
            </button>
            <div class="added-badge">
              <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Added
            </div>
            <div class="inqueue-badge">Already queued</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── SEARCH ───────────────────────────────────
async function doSearch() {
  const raw = document.getElementById('searchInput').value.trim();
  if (!raw) return;

  document.getElementById('clearBtn').classList.remove('hidden');
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('dynArea').innerHTML =
    `<div class="state"><div class="spinner"></div><div class="state-sub" style="margin-top:16px">Searching…</div></div>`;

  const directId = extractId(raw);

  try {
    if (directId) {
      // Direct URL/ID → oEmbed lookup
      const res = await apiFetch({ action: 'oembed', id: directId });
      renderResults(res.ok ? [res.data] : []);
    } else {
      // Keyword search via API proxy
      const res = await apiFetch({ action: 'search', q: raw });
      if (!res.ok) {
        document.getElementById('dynArea').innerHTML = `
          <div class="state">
            <div class="state-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
            <div class="state-title">Search unavailable</div>
            <div class="state-sub">${escHtml(res.error || 'No YouTube API key configured.')}
              <br>Paste a YouTube URL above to add directly.</div>
          </div>`;
      } else {
        renderResults(res.data || []);
      }
    }
  } catch(e) {
    document.getElementById('dynArea').innerHTML = `
      <div class="state">
        <div class="state-title">Connection error</div>
        <div class="state-sub">Could not reach the server. Try again.</div>
      </div>`;
  }

  document.getElementById('searchBtn').disabled = false;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.add('hidden');
  document.getElementById('dynArea').innerHTML = '';
  document.getElementById('searchInput').focus();
  showIdle();
}

// ── INPUT EVENTS ─────────────────────────────
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('hidden', !this.value);
});

// ── IDLE STATE ───────────────────────────────
function showIdle() {
  document.getElementById('dynArea').innerHTML = `
    <div class="state">
      <div class="state-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3v9.28a4.39 4.39 0 0 0-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
      </div>
      <div class="state-title">What do you want to hear?</div>
      <div class="state-sub">Search above or paste a YouTube link — your video will play on the big screen.</div>
    </div>`;
}

// ── INIT ─────────────────────────────────────
(async function init() {
  showIdle();
  // Load current queue to mark already-queued items
  try {
    const res = await apiFetch({ action: 'state' });
    if (res.ok) (res.data.queue || []).forEach(v => knownQueueIds.add(v.id));
  } catch(e) {}
  updatePeek();
})();
</script>
