<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projector Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0f;
    --panel:   #111118;
    --border:  #1e1e2e;
    --accent:  #e8ff47;
    --accent2: #ff4f47;
    --text:    #f0f0f0;
    --muted:   #555566;
    --active:  #1a1a2e;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden; user-select: none;
  }

  .stage {
    display: grid;
    grid-template-columns: 3fr 1fr;
    width: 100vw; height: 100vh;
  }

  /* ══ LEFT ══ */
  .player-col {
    display: flex; flex-direction: column;
    background: #000; border-right: 1px solid var(--border); overflow: hidden;
  }

  .video-wrap { flex: 1; position: relative; background: #000; overflow: hidden; }

  #ytPlayer { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  #ytPlayer iframe { position: absolute; inset: 0; width: 100% !important; height: 100% !important; border: none; }

  .placeholder {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #000 70%);
    transition: opacity .4s;
    cursor: pointer;
  }
  .placeholder.hidden { opacity: 0; pointer-events: none; }

  .placeholder-ring {
    width: 96px; height: 96px; border: 3px solid var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 2.6s ease-in-out infinite;
  }
  .placeholder-ring svg { width: 40px; height: 40px; fill: var(--accent); margin-left: 7px; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(232,255,71,.28); }
    50%      { box-shadow: 0 0 0 20px rgba(232,255,71,0); }
  }

  .placeholder-label { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .2em; color: var(--muted); }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    flex-shrink: 0;
    height: 6px;
    background: #0c0c14;
    position: relative;
    overflow: hidden;
  }

  .progress-bar-bg {
    position: absolute; inset: 0;
    background: rgba(255,255,255,.06);
  }

  .progress-bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--accent);
    width: 0%;
    transition: width .9s linear;
    border-radius: 0 3px 3px 0;
    box-shadow: 0 0 8px rgba(232,255,71,.5);
  }

  .progress-time {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: .55rem; color: rgba(255,255,255,.35);
    letter-spacing: .04em; line-height: 1;
    pointer-events: none;
  }

  /* ── TICKER ── */
  .ticker-bar {
    flex-shrink: 0; height: 80px; background: #0c0c14;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; overflow: hidden;
  }

  .ticker-tag {
    flex-shrink: 0; background: var(--accent); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: .18em;
    padding: 0 26px; height: 100%; display: flex; align-items: center;
  }

  .ticker-track {
    flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
  }

  .ticker-inner { display: flex; white-space: nowrap; will-change: transform; }
  .ticker-inner span { font-family: 'DM Mono', monospace; font-size: 1.35rem; letter-spacing: .05em; color: var(--text); padding-right: 80px; }

  @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ══ RIGHT ══ */
  .side-col { display: flex; flex-direction: column; background: var(--panel); overflow: hidden; }

  .side-header {
    flex-shrink: 0; padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .side-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; letter-spacing: .15em; color: var(--accent); }

  .badge {
    font-family: 'DM Mono', monospace; font-size: .65rem; padding: 3px 9px;
    background: var(--active); border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted); letter-spacing: .05em;
  }

  .playlist { flex: 1; overflow: hidden; }

  .playlist-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px; position: relative;
  }
  .playlist-item::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: transparent; border-radius: 0 2px 2px 0; transition: background .4s;
  }
  .playlist-item.active { background: rgba(232,255,71,.06); }
  .playlist-item.active::before { background: var(--accent); }

  .item-num { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0; }
  .playlist-item.active .item-num { visibility: hidden; }

  .live-icon { display: none; position: absolute; left: 13px; align-items: center; justify-content: center; width: 16px; }
  .playlist-item.active .live-icon { display: flex; }
  .live-icon svg { width: 11px; height: 11px; fill: var(--accent); animation: beatplay .75s ease-in-out infinite alternate; }
  @keyframes beatplay { from{transform:scale(.8)} to{transform:scale(1.2)} }

  .item-thumb { width: 64px; height: 38px; border-radius: 4px; flex-shrink: 0; overflow: hidden; background: var(--active); }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item-thumb-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); }
  .item-thumb-ph svg { width: 16px; height: 16px; fill: var(--muted); }

  .item-meta { flex: 1; min-width: 0; }
  .item-title { font-size: .77rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .playlist-item.active .item-title { color: var(--accent); }
  .item-ch   { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-dur  { font-family: 'DM Mono', monospace; font-size: .64rem; color: var(--muted); flex-shrink: 0; }

  /* ── QR ── */
  .qr-section {
    flex-shrink: 0; border-top: 1px solid var(--border);
    padding: 20px 16px 22px;
    display: flex; flex-direction: column; align-items: center; gap: 12px; background: #0d0d15;
  }

  .qr-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .2em; color: var(--accent); text-align: center; }

  .qr-frame {
    background: #fff; padding: 10px; border-radius: 10px; line-height: 0;
    box-shadow: 0 0 0 1px var(--border), 0 0 28px rgba(232,255,71,.15);
  }
  .qr-frame canvas, .qr-frame img { display: block; border-radius: 2px; }

  .qr-sub  { font-family: 'DM Mono', monospace; font-size: .85rem; color: var(--muted); text-align: center; line-height: 1.5; letter-spacing: .04em; }
  .qr-url  { font-family: 'DM Mono', monospace; font-size: .65rem; color: #aaaacc; text-align: center; word-break: break-all; }

  .clock {
    position: fixed; bottom: 11px; left: 16px;
    font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: .06em;
    pointer-events: none; z-index: 20;
  }
</style>
</head>
<body>

<div class="stage">
  <!-- ══ LEFT PLAYER ══ -->
  <div class="player-col">
    <div class="video-wrap">
		<div class="placeholder" id="placeholder">
		  <div class="placeholder-ring">
			<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
		  </div>
		  <div class="placeholder-label">Tap to activate display</div>
		</div>
      <div id="ytPlayer"></div>
    </div>

    <div class="progress-bar-wrap" id="progressBarWrap" style="display:none">
      <div class="progress-bar-bg"></div>
      <div class="progress-bar-fill" id="progressFill"></div>
      <div class="progress-time" id="progressTime"></div>
    </div>

    <div class="ticker-bar">
      <div class="ticker-tag">INFO</div>
      <div class="ticker-track">
        <div class="ticker-inner" id="tickerInner"></div>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT SIDEBAR ══ -->
  <div class="side-col">
    <div class="side-header">
      <span class="side-title">Up Next</span>
      <span class="badge" id="countBadge">0 videos</span>
    </div>

    <div class="playlist" id="playlist">
      <div style="padding:28px 14px;text-align:center;color:var(--muted);font-size:.73rem;line-height:1.9;font-family:'DM Mono',monospace;">
        Scan the QR code<br>to add a video
      </div>
    </div>

    <div class="qr-section">
      <div class="qr-label">Add a Video</div>
      <div class="qr-frame" id="qrFrame">
        <img id="qrImg" width="200" height="200" alt="QR Code" style="display:block;border-radius:2px">
      </div>
      <div class="qr-sub">Scan to submit your video</div>
      <div class="qr-url" id="qrUrlDisplay"></div>
    </div>
  </div>
</div>

<div class="clock" id="clock"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const API = window.location.pathname.replace(/[^\/]*$/, '') + 'api.php';
const ADD_URL   = window.location.origin + (window.location.pathname.replace(/[^/]*$/, '') ) + 'index.html';
const POLL_MS   = 4000;
const DEFAULT_TICKER = '📺  Welcome!  ·  Submit your video using the QR code  ·  Videos play automatically  ·  Scan to join the queue  ·  ';

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let queue      = [];
let played     = new Set();
let currentIdx = -1;
let ytPlayer   = null;
let ytApiReady = false;

// ═══════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════
(function() {
  const el = document.getElementById('clock');
  function tick() {
    const n = new Date();
    el.textContent = n.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}) + '  ' + n.toTimeString().slice(0,8);
  }
  tick(); setInterval(tick, 1000);
})();

// ═══════════════════════════════════════════════
//  QR CODE
//  Uses qrserver.com API — no library needed.
// ═══════════════════════════════════════════════
(function() {
  document.getElementById('qrUrlDisplay').textContent = ADD_URL;
  const img = document.getElementById('qrImg');
  // Primary: qrserver.com free API
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data=' + encodeURIComponent(ADD_URL);
  img.onerror = function() {
    // Fallback: Google Charts API
    this.onerror = null;
    this.src = 'https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=' + encodeURIComponent(ADD_URL);
  };
})();

// ═══════════════════════════════════════════════
//  TICKER
// ═══════════════════════════════════════════════
let _lastTicker = null;

function setTicker(text) {
  const t = (text && text.trim()) ? text : DEFAULT_TICKER;
  if (t === _lastTicker) return;
  _lastTicker = t;
  const inner = document.getElementById('tickerInner');
  const safe  = escHtml(t);
  inner.innerHTML = `<span>${safe}</span><span>${safe}</span>`;
  inner.style.animation = 'none';
  void inner.offsetWidth;
  const secs = Math.max(18, t.length * 0.25);
  inner.style.animation = `marquee ${secs}s linear infinite`;
}

setTicker(DEFAULT_TICKER);

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
//  PLAYLIST RENDER
// ═══════════════════════════════════════════════
function renderPlaylist() {
  const el    = document.getElementById('playlist');
  const badge = document.getElementById('countBadge');
  badge.textContent = queue.length + ' video' + (queue.length !== 1 ? 's' : '');

  if (!queue.length) {
    el.innerHTML = `<div style="padding:28px 14px;text-align:center;color:var(--muted);font-size:.73rem;line-height:1.9;font-family:'DM Mono',monospace;">Scan the QR code<br>to add a video</div>`;
    return;
  }

  el.innerHTML = queue.map((v, i) => `
    <div class="playlist-item ${i === currentIdx ? 'active' : ''}">
      <div class="item-num">${i + 1}</div>
      <div class="live-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="item-thumb">
        <img src="https://img.youtube.com/vi/${escHtml(v.id)}/mqdefault.jpg"
             loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="item-thumb-ph" style="display:none"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="item-meta">
        <div class="item-title">${escHtml(v.title)}</div>
        <div class="item-ch">${escHtml(v.channel || '')}</div>
      </div>
      <div class="item-dur">${escHtml(v.duration || '')}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
//  YOUTUBE PLAYER
// ═══════════════════════════════════════════════
window.onYouTubeIframeAPIReady = function() {
  ytApiReady = true;
  tryAutoStart();
};

(function() {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

function tryAutoStart() {
  if (currentIdx === -1 && queue.length > 0 && ytApiReady) playAt(0);
}

function playAt(idx) {
  if (idx < 0 || idx >= queue.length) return;
  currentIdx = idx;
  const v = queue[idx];

  document.getElementById('placeholder').classList.add('hidden');

  if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
    ytPlayer.mute();
    ytPlayer.loadVideoById(v.id);
    // Unmute after a short delay once playback starts
    setTimeout(() => { try { ytPlayer.unMute(); } catch(e){} }, 1500);
  } else {
    ytPlayer = new YT.Player('ytPlayer', {
      videoId: v.id,
      width: '100%', height: '100%',
      playerVars: {
        autoplay:       1,
        controls:       0,
        disablekb:      1,
        fs:             0,
        iv_load_policy: 3,
        modestbranding: 1,
        rel:            0,
        playsinline:    1,
        mute:           1,  // start muted so autoplay works, unmuted once playing
      },
      events: {
        onReady: function(e) {
          e.target.playVideo();
          // Unmute after playback starts - gives browser time to allow it
          setTimeout(() => { try { e.target.unMute(); e.target.setVolume(100); } catch(err){} }, 1500);
        },
        onStateChange: onPlayerState,
        onError:       () => advance()
      }
    });
  }

  played.add(v.id);
  renderPlaylist();
  startProgressTracking();
}

// ── PROGRESS BAR ─────────────────────────────
let progressTimer = null;

function fmt(sec) {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

function startProgressTracking() {
  clearInterval(progressTimer);
  document.getElementById('progressBarWrap').style.display = 'block';

  progressTimer = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    try {
      const cur      = ytPlayer.getCurrentTime() || 0;
      const dur      = ytPlayer.getDuration()    || 0;
      const pct      = dur > 0 ? (cur / dur) * 100 : 0;
      const timeLeft = dur > 0 ? fmt(dur - cur) : '';

      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressTime').textContent  = timeLeft ? '-' + timeLeft : '';

      // Push progress to API every 5s so admin can read it
      if (Math.round(cur) % 5 === 0 && dur > 0) {
        fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action:   'progress',
            current:  Math.floor(cur),
            duration: Math.floor(dur),
            video_id: queue[currentIdx]?.id || ''
          })
        }).catch(() => {});
      }
    } catch(e) {}
  }, 1000);
}

function stopProgressTracking() {
  clearInterval(progressTimer);
  document.getElementById('progressBarWrap').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressTime').textContent  = '';
}

function onPlayerState(e) {
  if (e.data === YT.PlayerState.ENDED) {
    // Mark as played in DB when video actually finishes
    const current = queue[currentIdx];
    if (current) {
      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'played', id: current.id })
      }).catch(() => {});
    }
    advance();
  }
}

function advance() {
  // After a video is marked played the API removes it from the queue,
  // so the next video always becomes index 0 after polling catches up.
  // We reset currentIdx and wait for the next poll to trigger tryAutoStart().
  currentIdx = -1;
  // Small delay to let the poll cycle fetch the updated queue from the server
  setTimeout(async () => {
    await poll();          // force an immediate poll
    if (queue.length > 0) {
      playAt(0);           // play whatever is now first
    } else {
      document.getElementById('placeholder').classList.remove('hidden');
      try { ytPlayer.stopVideo(); } catch(e) {}
      stopProgressTracking();
      renderPlaylist();
    }
  }, 1000);
}

// ═══════════════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════════════
let _lastQueueHash = '';

async function poll() {
  try {
    const r    = await fetch(API + '?action=state');
    const res  = await r.json();
    if (!res.ok) return;

    const data     = res.data;
    const newQueue = data.queue || [];
    const hash     = JSON.stringify(newQueue.map(v => v.id));

    if (hash !== _lastQueueHash) {
      _lastQueueHash = hash;
      queue = newQueue;
      renderPlaylist();
      tryAutoStart();
    }

    setTicker(data.ticker || '');
  } catch(e) {}
}

poll();
setInterval(poll, POLL_MS);

// ═══════════════════════════════════════════════
//  PROJECTOR COMMAND LISTENER
//  Polls api.php?action=command every 2s.
//  Executes play/pause/next/volume/mute/unmute
//  then ACKs so admin knows it was received.
// ═══════════════════════════════════════════════
async function pollCommand() {
  try {
    const r   = await fetch(API + '?action=command');
    const res = await r.json();
    if (!res.ok || !res.data) return;

    const cmd = res.data;
    executeCommand(cmd.cmd, cmd.value);

    // Acknowledge
    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'cmd_ack' })
    }).catch(() => {});
  } catch(e) {}
}

function executeCommand(cmd, value) {
  if (!ytPlayer || typeof ytPlayer.playVideo !== 'function') return;
  switch(cmd) {
    case 'play':    ytPlayer.playVideo();            break;
    case 'pause':   ytPlayer.pauseVideo();           break;
    case 'next':    advance();                       break;
    case 'volume':  ytPlayer.setVolume(parseInt(value) || 80);
                    ytPlayer.unMute();               break;
    case 'mute':    ytPlayer.mute();                 break;
    case 'unmute':  ytPlayer.unMute();               break;
    case 'seek':
      const seekTo = parseFloat(value) || 0;
      ytPlayer.seekTo(seekTo, true);
      break;
  }
}

setInterval(pollCommand, 2000);

// One-time click to unlock audio autoplay
document.getElementById('placeholder').addEventListener('click', function() {
  this.style.cursor = 'default';
  // Create and immediately destroy a silent audio context to unlock autoplay
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume().then(() => ctx.close());
  this.querySelector('.placeholder-label').textContent = 'Waiting for videos…';
}, { once: true });
</script>
</body>
</html>
