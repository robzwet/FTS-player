<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Playlist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:      #08080f;
    --surface: #0f0f1a;
    --card:    #13131f;
    --border:  #1f1f32;
    --accent:  #e8ff47;
    --text:    #f0f0f0;
    --muted:   #55557a;
    --muted2:  #888899;
    --green:   #47ffb2;
    --danger:  #ff4f47;
  }
 
  html { scroll-behavior: smooth; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }
 
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 40% at 50% -5%, rgba(232,255,71,.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 90% 90%, rgba(71,255,178,.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
 
  .page {
    position: relative; z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }
 
  /* ── HEADER ── */
  .header {
    padding: 40px 0 28px;
    animation: fadeUp .4s ease both;
  }
 
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
 
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 7vw, 2.6rem);
    font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
  }
  h1 .hl { color: var(--accent); }
 
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--green);
    background: rgba(71,255,178,.08); border: 1px solid rgba(71,255,178,.2);
    border-radius: 20px; padding: 4px 10px; flex-shrink: 0;
  }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
 
  .header-sub {
    font-size: .85rem; color: var(--muted2); margin-top: 8px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
 
  .queue-count {
    font-family: 'DM Mono', monospace; font-size: .7rem;
    color: var(--accent);
    background: rgba(232,255,71,.08); border: 1px solid rgba(232,255,71,.15);
    border-radius: 20px; padding: 3px 10px;
  }
 
  /* ── NOW PLAYING ── */
  .now-playing-card {
    background: var(--card); border: 1px solid rgba(232,255,71,.25);
    border-radius: 14px; overflow: hidden; margin-bottom: 24px;
    animation: fadeUp .4s .1s ease both;
    position: relative;
  }
  .now-playing-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--accent);
    border-radius: 4px 0 0 4px;
  }
 
  .np-inner {
    display: flex; gap: 14px; align-items: center; padding: 14px 14px 14px 18px;
  }
 
  .np-thumb {
    width: 90px; height: 51px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0; background: var(--surface);
  }
 
  .np-meta { flex: 1; min-width: 0; }
  .np-label {
    font-family: 'DM Mono', monospace; font-size: .58rem;
    color: var(--accent); letter-spacing: .12em; text-transform: uppercase;
    margin-bottom: 5px; display: flex; align-items: center; gap: 5px;
  }
  .np-label-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: blink 1.2s ease-in-out infinite; }
  .np-title {
    font-size: .9rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .np-ch { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted2); }
 
  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'DM Mono', monospace; font-size: .63rem;
    color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 10px; margin-top: 8px;
    animation: fadeUp .4s .15s ease both;
  }
 
  /* ── QUEUE ITEMS ── */
  .queue-list { display: flex; flex-direction: column; gap: 8px; }
 
  .q-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px;
    animation: fadeUp .3s ease both;
    position: relative; overflow: hidden;
  }
 
  .q-num {
    font-family: 'DM Mono', monospace; font-size: .72rem;
    color: var(--muted); width: 22px; text-align: center; flex-shrink: 0;
    font-weight: 500;
  }
 
  .q-thumb {
    width: 72px; height: 41px; border-radius: 6px;
    object-fit: cover; flex-shrink: 0; background: var(--surface);
  }
 
  .q-meta { flex: 1; min-width: 0; }
  .q-title {
    font-size: .84rem; font-weight: 500; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .q-sub {
    font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted2);
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .q-sep { color: var(--border); }
 
  .q-dur {
    font-family: 'DM Mono', monospace; font-size: .64rem;
    color: var(--muted); flex-shrink: 0;
  }
 
  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 56px 0 24px;
    animation: fadeUp .4s ease both;
  }
  .empty-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .empty-icon svg { width: 28px; height: 28px; fill: var(--muted); }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .empty-sub   { font-size: .84rem; color: var(--muted2); line-height: 1.6; }
 
  /* ── ADD BUTTON ── */
  .add-cta {
    display: flex; align-items: center; justify-content: center; gap: 9px;
    background: var(--accent); color: #000;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: .9rem; letter-spacing: .03em;
    padding: 14px 28px; border-radius: 12px;
    text-decoration: none; margin-top: 24px;
    transition: opacity .15s, transform .1s;
    width: 100%;
  }
  .add-cta:hover  { opacity: .88; }
  .add-cta:active { transform: scale(.98); }
  .add-cta svg { width: 18px; height: 18px; fill: currentColor; }
 
  /* ── REFRESH ── */
  .refresh-row {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 24px;
    font-family: 'DM Mono', monospace; font-size: .65rem;
    color: var(--muted); letter-spacing: .06em;
  }
  .refresh-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); animation: blink 2s ease-in-out infinite;
  }
 
  /* ── SPINNER ── */
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
 
<div class="page">
 
  <div class="header">
    <div class="header-top">
      <h1>What's <span class="hl">playing</span></h1>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
    </div>
    <div class="header-sub">
      The full queue — updates automatically
      <span class="queue-count" id="queueCount">loading…</span>
    </div>
  </div>
 
  <div id="mainContent"><div class="spinner"></div></div>
 
  <a href="index.html" class="add-cta">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    Add your video
  </a>
 
  <div class="refresh-row">
    <div class="refresh-dot"></div>
    Refreshes every 5 seconds
  </div>
 
</div>
 
<script>
const API = window.location.pathname.replace(/[^\/]*$/, '') + 'api.php';
 
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
async function loadQueue() {
  try {
    const r   = await fetch(API + '?action=state');
    const res = await r.json();
    if (!res.ok) return;
    render(res.data.queue || []);
  } catch(e) {}
}
 
function render(queue) {
  const el = document.getElementById('mainContent');
  const countEl = document.getElementById('queueCount');
 
  if (!queue.length) {
    countEl.textContent = '0 videos';
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v9.28a4.39 4.39 0 0 0-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
        </div>
        <div class="empty-title">Queue is empty</div>
        <div class="empty-sub">Be the first to add a video!</div>
      </div>`;
    return;
  }
 
  countEl.textContent = queue.length + ' video' + (queue.length !== 1 ? 's' : '');
 
  const nowPlaying = queue[0];
  const upNext     = queue.slice(1);
 
  let html = '';
 
  // Now playing card
  html += `
    <div class="now-playing-card">
      <div class="np-inner">
        <img class="np-thumb"
             src="https://img.youtube.com/vi/${escHtml(nowPlaying.id)}/mqdefault.jpg"
             onerror="this.src='https://img.youtube.com/vi/${escHtml(nowPlaying.id)}/default.jpg'"
             loading="lazy">
        <div class="np-meta">
          <div class="np-label"><div class="np-label-dot"></div>Now Playing</div>
          <div class="np-title">${escHtml(nowPlaying.title)}</div>
          <div class="np-ch">${escHtml(nowPlaying.channel || '')}</div>
        </div>
      </div>
    </div>`;
 
  if (upNext.length) {
    html += `<div class="section-label">Up Next — ${upNext.length} video${upNext.length !== 1 ? 's' : ''}</div>`;
    html += `<div class="queue-list">`;
    html += upNext.map((v, i) => `
      <div class="q-item" style="animation-delay:${i * 0.04}s">
        <div class="q-num">${i + 2}</div>
        <img class="q-thumb"
             src="https://img.youtube.com/vi/${escHtml(v.id)}/mqdefault.jpg"
             onerror="this.src='https://img.youtube.com/vi/${escHtml(v.id)}/default.jpg'"
             loading="lazy">
        <div class="q-meta">
          <div class="q-title">${escHtml(v.title)}</div>
          <div class="q-sub">
            <span>${escHtml(v.channel || '')}</span>
            ${v.duration ? `<span class="q-sep">·</span><span>${escHtml(v.duration)}</span>` : ''}
          </div>
        </div>
        <div class="q-dur">${escHtml(v.duration || '')}</div>
      </div>`).join('');
    html += `</div>`;
  }
 
  el.innerHTML = html;
}
 
// Initial load then poll every 5s
loadQueue();
setInterval(loadQueue, 5000);
</script>
</body>
</html>
